<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Advanced Stock Summary Generator</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
body { font-family: Arial, sans-serif; margin:0; background:#f5f5f5; }
.container { max-width: 1400px; margin:auto; padding:20px; }
h1 { text-align:center; }
.panel { background:white; padding:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.1); margin-bottom:20px; }
.drop-zone { border:3px dashed #999; padding:30px; text-align:center; border-radius:10px; cursor:pointer; }
.drop-zone.dragover { background:#eef6ff; border-color:#0d6efd; }
.controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:15px; }
button, select, input { padding:10px 14px; border-radius:8px; border:1px solid #ccc; }
button { background:#0d6efd; color:white; border:none; cursor:pointer; }
button.secondary { background:#6c757d; }
.summary-sheet { background:white; margin:30px 0; box-shadow:0 2px 8px rgba(0,0,0,.1); page-break-after:always; }
.title { background:#fff200; font-size:32px; font-weight:bold; text-align:center; padding:15px; text-transform:uppercase; }
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #000; padding:6px; font-size:13px; text-align:center; }
th { background:#eaeaea; }
.hidden { display:none; }
@media print {
  .panel { display:none; }
  .summary-sheet { box-shadow:none; margin:0; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Advanced Stock Summary Generator</h1>

  <div class="panel">
    <div id="dropZone" class="drop-zone">
      Drag & Drop Excel File Here or Click to Select
      <input type="file" id="fileInput" accept=".xlsx,.xls" hidden>
    </div>

    <div class="controls">
      <select id="yearFilter"><option value="">All Years</option></select>
      <select id="branchFilter"><option value="">All Branches</option></select>
     
<select id="vehicleFilter" multiple size="8" style="min-width:220px;">
</select>


      <input id="customTitle" placeholder="Custom Report Title (optional)">
      <button onclick="generateReports()">Generate Reports</button>
      <button onclick="downloadAllExcel()">Download Excel ZIP</button>
      <button onclick="downloadAllPDF()">Download PDF ZIP</button>
      <button class="secondary" onclick="window.print()">Print</button>
    </div>
  </div>

  <div id="output"></div>
</div>

<script>
let rawRows = [];
let groupedData = {};

const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const output = document.getElementById('output');

// Show selected file name
function showFileName(name) {
  dropZone.innerHTML = `
    <strong>Selected File:</strong><br>
    ${name}
    <br><br>
    <small>Click or drop another file to replace it.</small>
    <input type="file" id="fileInput" accept=".xlsx,.xls" hidden>
  `;
  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });
}

dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) handleFile(file);
});


function excelDateToYear(value) {
  if (!value) return '';

  if (typeof value === 'number') {
    const d = XLSX.SSF.parse_date_code(value);
    return d ? String(d.y) : '';
  }

  const text = String(value).trim();

  // Direct year like 2025
  if (/^\d{4}$/.test(text)) {
    return text;
  }

  const dt = new Date(text);
  return isNaN(dt) ? '' : String(dt.getFullYear());
}

function normalizeRow(r) {
  const year =
    String(
      r['Year Of Model'] ||
      r['Year of Model'] ||
      r['YEAR OF MODEL'] ||
      excelDateToYear(r.Date) ||
      new Date().getFullYear()
    );

  return {
    subdealer: r.Subdealer || '',
    vehicle: r.Vehicle || '',
    model: extractModel(r.Vehicle || ''),
    chassis: r['Chassis Number'] || '',
    engine: r['Engine Number'] || '',
    colour: r.Colour || '',
    year
  };
}


// Extract model name
function extractModel(vehicle) {
  const v = (vehicle || '').toUpperCase();

  const patterns = [
    'ZEST',
    'RAIDER',
    'JUPITER',
    'NTORQ',
    'APACHE',
    'RONIN',
    'SPORT',
    'XL100',
    'RADIAN'
  ];

  for (const p of patterns) {
    if (v.includes(p)) return p;
  }

  return v.split(/\s+/).slice(0, 3).join(' ');
}

// Handle uploaded file
function handleFile(file) {
  if (!file) return;

  showFileName(file.name);

  const reader = new FileReader();

  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });

      const sheet = workbook.Sheets[workbook.SheetNames[0]];

      let rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });

      // If Vehicle column missing, try starting from row 4
      if (!rows.length || !('Vehicle' in rows[0])) {
        rows = XLSX.utils.sheet_to_json(sheet, {
          range: 3,
          defval: ''
        });
      }

      rawRows = rows
        .map(normalizeRow)
        .filter(r => r.vehicle && r.chassis);

      if (rawRows.length === 0) {
        alert('No valid stock records found in the Excel file.');
        return;
      }

      populateFilters();
      generateReports();

      alert(`${rawRows.length} records loaded successfully.`);
    } catch (err) {
      console.error(err);
      alert('Error reading Excel file.');
    }
  };

  reader.readAsArrayBuffer(file);
}

function populateFilters() {
  const yearFilter = document.getElementById('yearFilter');
  const branchFilter = document.getElementById('branchFilter');
  const vehicleFilter = document.getElementById('vehicleFilter');

  const years = [...new Set(rawRows.map(r => r.year))]
    .filter(Boolean)
    .sort();

  const branches = [...new Set(rawRows.map(r => r.subdealer))]
    .filter(Boolean)
    .sort();

  const vehicles = [...new Set(rawRows.map(r => r.model))]
    .filter(Boolean)
    .sort();

  yearFilter.innerHTML = '<option value="">All Years</option>';
  branchFilter.innerHTML = '<option value="">All Branches</option>';
  vehicleFilter.innerHTML = '';

  years.forEach(y => {
    yearFilter.innerHTML += `<option value="${y}">${y}</option>`;
  });

  branches.forEach(b => {
    branchFilter.innerHTML += `<option value="${b}">${b}</option>`;
  });

  vehicles.forEach(v => {
    vehicleFilter.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

// Generate reports
function generateReports() {
  if (rawRows.length === 0) {
    alert('Please upload a file first.');
    return;
  }

 
const year = document.getElementById('yearFilter').value;
const branch = document.getElementById('branchFilter').value;
const customTitle =
  document.getElementById('customTitle').value.trim();

const selectedVehicles = Array.from(
  document.getElementById('vehicleFilter').selectedOptions
).map(option => option.value);

const rows = rawRows.filter(r =>
  (!year || r.year === year) &&
  (!branch || r.subdealer === branch) &&
  (
    selectedVehicles.length === 0 ||
    selectedVehicles.includes(r.model)
  )
);


  groupedData = {};

  rows.forEach(r => {
    const key = `${extractModel(r.vehicle)}|${r.year}`;
    if (!groupedData[key]) groupedData[key] = [];
    groupedData[key].push(r);
  });

  output.innerHTML = '';

  const keys = Object.keys(groupedData);

  if (keys.length === 0) {
    output.innerHTML =
      '<p style="text-align:center;font-weight:bold;">No records found.</p>';
    return;
  }

  keys.sort().forEach(key => {
    const [model, yr] = key.split('|');
    const title = customTitle || `${model} ${yr} MODEL STOCK`;

    const section = document.createElement('div');
    section.className = 'summary-sheet';

    let html = `
      <div class="title">${title}</div>
      <table class="table">
        <thead>
          <tr>
            <th>SNo</th>
            <th>Subdealer</th>
            <th>Vehicle</th>
            <th>Chassis Number</th>
            <th>Engine Number</th>
            <th>Colour</th>
            <th>Year Of Model</th>
          </tr>
        </thead>
        <tbody>
    `;

    groupedData[key].forEach((r, i) => {
      html += `
        <tr>
          <td>${i + 1}</td>
          <td>${r.subdealer}</td>
          <td>${r.vehicle}</td>
          <td>${r.chassis}</td>
          <td>${r.engine}</td>
          <td>${r.colour}</td>
          <td>${r.year}</td>
        </tr>
      `;
    });

    html += '</tbody></table>';

    section.innerHTML = html;
    output.appendChild(section);
  });
}


// ========================================
// DOWNLOAD ALL EXCEL FILES + MASTER WORKBOOK
// ========================================
async function downloadAllExcel() {
  if (Object.keys(groupedData).length === 0) {
    alert('No reports generated.');
    return;
  }

  const zip = new JSZip();

  // Master workbook containing all sheets
  const masterWorkbook = XLSX.utils.book_new();

  for (const [key, rows] of Object.entries(groupedData)) {
    const [model, yr] = key.split('|');

    const sheetData = rows.map((r, i) => ({
      SNo: i + 1,
      Subdealer: r.subdealer,
      Vehicle: r.vehicle,
      'Chassis Number': r.chassis,
      'Engine Number': r.engine,
      Colour: r.colour,
      'Year Of Model': r.year
    }));

    // Create worksheet
    const ws = XLSX.utils.json_to_sheet(sheetData);

    // -----------------------------
    // Individual Excel file
    // -----------------------------
    const singleWb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(singleWb, ws, 'Summary');

    const singleFile = XLSX.write(singleWb, {
      bookType: 'xlsx',
      type: 'array'
    });

    zip.file(`${model}_${yr}.xlsx`, singleFile);

    // -----------------------------
    // Add to master workbook
    // -----------------------------
    let sheetName = `${model}_${yr}`;
    sheetName = sheetName.substring(0, 31); // Excel limit

    XLSX.utils.book_append_sheet(
      masterWorkbook,
      ws,
      sheetName
    );
  }

  // Add master workbook to ZIP
  const masterArray = XLSX.write(masterWorkbook, {
    bookType: 'xlsx',
    type: 'array'
  });

  zip.file('All_Stock_Summaries.xlsx', masterArray);

  // Generate ZIP
  const blob = await zip.generateAsync({
    type: 'blob'
  });

  saveBlob(blob, 'Stock_Summaries_Excel.zip');
}


// ========================================
// DOWNLOAD PDF ZIP + COMBINED PDF
// ========================================

async function downloadAllPDF() {
  if (Object.keys(groupedData).length === 0) {
    alert('No reports generated.');
    return;
  }

  const zip = new JSZip();
  const sections = document.querySelectorAll('.summary-sheet');
  const { jsPDF } = window.jspdf;

  const combinedPdf = new jsPDF({
    orientation: 'landscape',
    unit: 'pt',
    format: 'a4'
  });

  for (let i = 0; i < sections.length; i++) {
    const section = sections[i];

    const title = section.querySelector('.title')
      .textContent
      .replace(/[\\/:*?"<>|]/g, '_');

    const canvas = await html2canvas(section, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff'
    });

    const imgData = canvas.toDataURL('image/jpeg', 1.0);

    const pageWidth = 842;
    const pageHeight = 595;

    const ratio = Math.min(
      pageWidth / canvas.width,
      pageHeight / canvas.height
    );

    const imgWidth = canvas.width * ratio;
    const imgHeight = canvas.height * ratio;

    const x = (pageWidth - imgWidth) / 2;
    const y = (pageHeight - imgHeight) / 2;

    // Individual PDF
    const singlePdf = new jsPDF({
      orientation: 'landscape',
      unit: 'pt',
      format: 'a4'
    });

    singlePdf.addImage(
      imgData,
      'JPEG',
      x,
      y,
      imgWidth,
      imgHeight
    );

    zip.file(
      `${title}.pdf`,
      singlePdf.output('arraybuffer')
    );

    // Combined PDF
    if (i > 0) combinedPdf.addPage();

    combinedPdf.addImage(
      imgData,
      'JPEG',
      x,
      y,
      imgWidth,
      imgHeight
    );
  }

  zip.file(
    'All_Stock_Summaries.pdf',
    combinedPdf.output('arraybuffer')
  );

  const blob = await zip.generateAsync({ type: 'blob' });
  saveBlob(blob, 'Stock_Summaries_PDF.zip');
}


// Save file
function saveBlob(blob, filename) {
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>

</body>
</html>
